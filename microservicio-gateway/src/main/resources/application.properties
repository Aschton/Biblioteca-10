server.port=8080
spring.application.name=microservicio-gateway

# Filtro por defecto aplicado a TODAS las rutas: agrega una cabecera de respuesta.
spring.cloud.gateway.default-filters[0]=AddResponseHeader=X-Gateway,microservicio-gateway-libreria

# Cada uri usa una variable de entorno con valor por defecto en localhost.
# En local funciona tal cual; en Docker se sobreescribe con el nombre del contenedor.

# Ruta 1: /api/libros -> microservicio de libros
spring.cloud.gateway.routes[0].id=microservicio-libros
spring.cloud.gateway.routes[0].uri=${LIBROS_URI:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/libros/**

# Ruta 2: /api/usuarios -> microservicio de usuarios
spring.cloud.gateway.routes[1].id=microservicio-usuarios
spring.cloud.gateway.routes[1].uri=${USUARIOS_URI:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/usuarios/**

