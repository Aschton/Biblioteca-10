spring.application.name=microservicio-prestamos
server.port=8083

spring.datasource.url=jdbc:h2:file:./data/prestamosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion JPA / Hibernate: crea y actualiza el esquema automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Timeouts para Feign
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# URLs de los microservicios que consume via Feign.
# Por defecto localhost (ejecucion local); en Docker se sobreescriben con
# las variables de entorno LIBROS_URL y USUARIOS_URL (ver docker-compose.yml).
libros.url=${LIBROS_URL:http://localhost:8081}
usuarios.url=${USUARIOS_URL:http://localhost:8082}

# Ruta de la interfaz de Swagger: http://localhost:8083/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
