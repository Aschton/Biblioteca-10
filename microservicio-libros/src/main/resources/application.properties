spring.application.name=microservicio-libros
server.port=8081

spring.datasource.url=jdbc:h2:file:./data/librosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion JPA / Hibernate: crea y actualiza el esquema automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Ruta de la interfaz de Swagger: http://localhost:8081/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
